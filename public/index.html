<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#7fffb2">
<link rel="manifest" href="manifest.json">
<title>YT Watcher</title>
<style>
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--border:#2a2a38;--accent:#7fffb2;--accent2:#ff7f50;--accent3:#7fb8ff;--text:#e0e0e8;--muted:#666678;--danger:#ff4466;--r:6px;--bar:28px;--tab:34px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;font-size:13px;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── Menu bar ── */
#bar{position:fixed;top:0;left:0;right:0;height:var(--bar);background:rgba(10,10,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;z-index:200}
.dots{display:flex;gap:6px;padding:0 12px}
.dot{width:11px;height:11px;border-radius:50%}
.dot.r{background:#ff5f57}.dot.y{background:#ffbd2e}.dot.g{background:#28c840}
.bar-title{padding:0 8px;font-weight:bold;color:var(--accent);font-size:12px}
.spacer{flex:1}
.bar-right{display:flex;align-items:center;gap:5px;padding:0 8px}
.badge{font-size:10px;padding:1px 6px;border-radius:8px;background:var(--accent);color:#000;font-weight:bold;cursor:pointer;white-space:nowrap}
.badge.off{background:var(--muted)}.badge.warn{background:var(--accent2)}
.bar-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:3px 6px;font-size:11px;border-radius:4px;font-family:inherit}
.bar-btn:hover{background:var(--bg3);color:var(--text)}

/* ── Tab bar ── */
#tabbar{position:fixed;top:var(--bar);left:0;right:0;height:var(--tab);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:flex-end;padding:0 4px 0 4px;overflow-x:auto;overflow-y:hidden;z-index:190;gap:1px}
#tabbar::-webkit-scrollbar{height:2px}
.tab-item{flex-shrink:0;height:28px;min-width:120px;max-width:200px;display:flex;align-items:center;gap:5px;padding:0 8px;background:var(--bg3);border:1px solid var(--border);border-bottom:none;border-radius:6px 6px 0 0;cursor:pointer;position:relative;user-select:none;transition:background .1s}
.tab-item.active{background:var(--bg);border-bottom-color:var(--bg)}
.tab-item.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:var(--bg)}
.tab-icon{font-size:11px;flex-shrink:0;color:var(--muted)}
.tab-item.active .tab-icon{color:var(--accent)}
.tab-name{flex:1;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted)}
.tab-item.active .tab-name{color:var(--text)}
.tab-close{width:16px;height:16px;border-radius:50%;border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;padding:0;line-height:1}
.tab-close:hover{background:rgba(255,68,102,.2);color:var(--danger)}
.tab-add{flex-shrink:0;width:28px;height:28px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:18px;border-radius:6px 6px 0 0;display:flex;align-items:center;justify-content:center;margin-left:2px}
.tab-add:hover{background:var(--bg3);color:var(--accent)}

/* ── Content ── */
#app{position:fixed;top:62px;left:0;right:0;bottom:0;overflow:hidden}
.pane{position:absolute;inset:0;overflow-y:auto;display:none;padding:16px}
.pane.active{display:block}

/* ── Setup ── */
.setup-box{max-width:480px;margin:40px auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:24px}
.setup-box h2{font-size:13px;color:var(--accent);margin-bottom:16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
input[type=text]{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:7px 10px;font-family:inherit;font-size:12px;outline:none;width:100%}
input[type=text]:focus{border-color:var(--accent)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
button{padding:7px 14px;border-radius:var(--r);border:none;cursor:pointer;font-family:inherit;font-size:12px;transition:all .15s}
.btn-accent{background:var(--accent);color:#000;font-weight:bold}
.btn-accent:hover{filter:brightness(1.1)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:4px 10px;font-size:10px}
.btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.errmsg{font-size:11px;color:var(--danger);margin-top:6px;display:none}

/* ── Videos ── */
.vid-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.vid-count{font-size:10px;color:var(--muted)}
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.video-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .15s}
.video-card:hover{border-color:var(--accent)}
.video-card img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--bg3)}
.vc-title{padding:8px;font-size:11px;line-height:1.4;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.empty{text-align:center;padding:60px 20px;color:var(--muted);line-height:2;font-size:12px}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:12px}

/* ── Notif panel ── */
#notif-panel{position:fixed;top:var(--bar);right:0;width:300px;bottom:0;background:var(--bg2);border-left:1px solid var(--border);z-index:180;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column}
#notif-panel.open{transform:translateX(0)}
.np-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.np-list{flex:1;overflow-y:auto;padding:8px}
.notif-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px;margin-bottom:6px}
.ni-title{font-weight:bold;color:var(--accent);font-size:11px;margin-bottom:2px}
.ni-body{font-size:11px;color:var(--text);line-height:1.5}
.ni-time{font-size:10px;color:var(--muted);margin-top:3px}
.ni-link{display:inline-block;font-size:10px;color:var(--accent3);text-decoration:none;margin-top:3px}

/* ── Recents panel ── */
#recent-panel{position:fixed;top:var(--bar);left:0;width:260px;bottom:0;background:var(--bg2);border-right:1px solid var(--border);z-index:180;transform:translateX(-100%);transition:transform .25s;display:flex;flex-direction:column}
#recent-panel.open{transform:translateX(0)}
.rp-header{padding:10px 14px;border-bottom:1px solid var(--border);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.rp-list{flex:1;overflow-y:auto;padding:8px}
.recent-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.ri-info{flex:1;min-width:0}
.ri-name{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ri-pl{font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ri-time{font-size:10px;color:var(--muted);margin-top:2px}

/* ── Share modal ── */
#share-modal,#rename-modal,#import-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;align-items:center;justify-content:center}
#share-modal.open,#rename-modal.open,#import-modal.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:22px;width:360px;max-width:90vw}
.modal-box h3{font-size:12px;color:var(--accent);margin-bottom:14px}
.share-url{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;font-size:10px;color:var(--muted);word-break:break-all;margin-bottom:10px;line-height:1.5;max-height:80px;overflow-y:auto}
.sec{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
</style>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Menu bar -->
<div id="bar">
  <div class="dots"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div>
  <span class="bar-title">YT Watcher</span>
  <div class="spacer"></div>
  <div class="bar-right">
    <button class="bar-btn" onclick="toggleRecent()">最近</button>
    <button class="bar-btn" onclick="openShare()">共有</button>
    <span class="badge off" id="push-badge" onclick="togglePush()">PUSH OFF</span>
    <span class="badge off" id="notif-badge" onclick="toggleNotifPanel()">0件</span>
  </div>
</div>

<!-- Tab bar -->
<div id="tabbar">
  <button class="tab-add" onclick="addTab()" title="新しいタブ">+</button>
</div>

<!-- Panes -->
<div id="app"></div>

<!-- Notification panel -->
<div id="notif-panel">
  <div class="np-header">
    <span>通知センター</span>
    <button class="btn-outline btn-sm" onclick="clearNotifs()">全消去</button>
  </div>
  <div class="np-list" id="np-list"></div>
</div>

<!-- Recents panel -->
<div id="recent-panel">
  <div class="rp-header">最近削除したタブ</div>
  <div class="rp-list" id="rp-list"></div>
</div>

<!-- Rename modal -->
<div id="rename-modal">
  <div class="modal-box">
    <h3>タブ名を変更</h3>
    <div class="field">
      <input type="text" id="rename-input" placeholder="タブ名">
    </div>
    <div class="btn-row">
      <button class="btn-accent" onclick="confirmRename()">保存</button>
      <button class="btn-outline" onclick="closeModal('rename-modal')">キャンセル</button>
    </div>
  </div>
</div>

<!-- Share modal -->
<div id="share-modal">
  <div class="modal-box">
    <h3>プレイリストを共有</h3>
    <div class="sec">共有するタブを選択</div>
    <div id="share-checks" style="margin-bottom:12px"></div>
    <div id="share-url-box" style="display:none">
      <div class="sec">共有URL</div>
      <div class="share-url" id="share-url-text"></div>
      <button class="btn-accent btn-sm" onclick="copyShareUrl()">URLをコピー</button>
    </div>
    <div class="btn-row" style="margin-top:12px">
      <button class="btn-accent" onclick="generateShareUrl()">URLを生成</button>
      <button class="btn-outline" onclick="closeModal('share-modal')">閉じる</button>
    </div>
  </div>
</div>

<!-- Import modal -->
<div id="import-modal">
  <div class="modal-box">
    <h3>プレイリストをインポート</h3>
    <div style="font-size:12px;color:var(--text);line-height:1.7;margin-bottom:14px" id="import-preview"></div>
    <div class="btn-row">
      <button class="btn-accent" onclick="confirmImport()">追加</button>
      <button class="btn-outline" onclick="closeModal('import-modal')">キャンセル</button>
    </div>
  </div>
</div>

<script>
const WORKER = 'https://yt-push-register.a6068376.workers.dev';
const VAPID_PUBLIC_KEY = 'BFn5vOBnMFz0R3ZlLHsnKb36VU_Lq5q9iQVFmxjH3q1HK3L9VesUlGW8Jw37LoLmWs-yFXAdMHBmeq22wRT2dmc';

// ── State ─────────────────────────────────────────────────────────────────────
let tabs    = JSON.parse(localStorage.getItem('yt_tabs')   || '[]');
let recents = JSON.parse(localStorage.getItem('yt_recent') || '[]'); // 削除したタブ履歴
let notifs  = JSON.parse(localStorage.getItem('yt_notifs') || '[]');
let activeTabId = localStorage.getItem('yt_active_tab') || null;
let swReg = null, pushSub = null;
let notifOpen = false, recentOpen = false;
let renameTabId = null;
let videoCache = {};
let pendingImport = null;

if (!tabs.length) { tabs = [newTab('プレイリスト 1', '')]; saveTabs(); }
if (!activeTabId || !tabs.find(t => t.id === activeTabId)) activeTabId = tabs[0].id;

function newTab(name, playlistId) {
  return { id: Date.now().toString(36) + Math.random().toString(36).slice(2,6), name, playlistId, createdAt: Date.now() };
}

function saveTabs() {
  localStorage.setItem('yt_tabs', JSON.stringify(tabs));
  localStorage.setItem('yt_active_tab', activeTabId);
}

function saveRecents() {
  localStorage.setItem('yt_recent', JSON.stringify(recents));
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  // Check for import URL param
  const params = new URLSearchParams(location.search);
  const importData = params.get('import');
  if (importData) {
    try {
      const decoded = JSON.parse(atob(importData));
      if (Array.isArray(decoded)) { pendingImport = decoded; showImportModal(decoded); }
    } catch {}
    history.replaceState({}, '', location.pathname);
  }

  if ('serviceWorker' in navigator) {
    try {
      swReg = await navigator.serviceWorker.register('sw.js');
      await navigator.serviceWorker.ready;
      pushSub = await swReg.pushManager.getSubscription();
      updatePushBadge();
    } catch(e) { console.error('SW:', e); }
  }
  renderTabBar();
  renderApp();
  updateNotifBadge();
})();

// ── Tab bar ───────────────────────────────────────────────────────────────────
function renderTabBar() {
  const bar = document.getElementById('tabbar');
  const addBtn = bar.querySelector('.tab-add');
  bar.querySelectorAll('.tab-item').forEach(el => el.remove());
  tabs.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab-item' + (tab.id === activeTabId ? ' active' : '');
    el.dataset.id = tab.id;
    el.innerHTML = `
      <span class="tab-icon">${tab.playlistId ? '▶' : '○'}</span>
      <span class="tab-name">${esc(tab.name)}</span>
      <button class="tab-close" title="閉じる">×</button>`;
    el.querySelector('.tab-close').addEventListener('click', e => { e.stopPropagation(); closeTab(tab.id); });
    el.addEventListener('click', () => switchTab(tab.id));
    el.addEventListener('dblclick', () => openRename(tab.id));
    bar.insertBefore(el, addBtn);
  });
  const active = bar.querySelector('.tab-item.active');
  if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center' });
}

// ── App / Panes ───────────────────────────────────────────────────────────────
function renderApp() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  tabs.forEach(tab => {
    const pane = document.createElement('div');
    pane.className = 'pane' + (tab.id === activeTabId ? ' active' : '');
    pane.id = 'pane-' + tab.id;
    app.appendChild(pane);
    if (tab.id === activeTabId) renderPane(tab);
  });
}

function renderPane(tab) {
  const pane = document.getElementById('pane-' + tab.id);
  if (!pane) return;
  tab.playlistId ? renderVideos(pane, tab) : renderSetup(pane, tab);
}

// ── Setup ─────────────────────────────────────────────────────────────────────
function renderSetup(pane, tab) {
  pane.innerHTML = `
    <div class="setup-box">
      <h2>プレイリストを設定</h2>
      <div class="field">
        <label>タブ名</label>
        <input type="text" id="sn-${tab.id}" value="${esc(tab.name)}" placeholder="タブ名">
      </div>
      <div class="field">
        <label>プレイリストURL または ID</label>
        <input type="text" id="sp-${tab.id}" value="${esc(tab.playlistId)}" placeholder="https://www.youtube.com/playlist?list=PL...">
      </div>
      <div class="errmsg" id="se-${tab.id}"></div>
      <div class="btn-row">
        <button class="btn-accent" onclick="saveTabPlaylist('${tab.id}')">保存</button>
        ${tab.playlistId ? `<button class="btn-outline" onclick="cancelSetup('${tab.id}')">キャンセル</button>` : ''}
      </div>
    </div>`;
}

function cancelSetup(tabId) {
  const tab = tabs.find(t => t.id === tabId);
  const pane = document.getElementById('pane-' + tabId);
  if (tab && pane && tab.playlistId) renderVideos(pane, tab);
}

function saveTabPlaylist(tabId) {
  const nameEl = document.getElementById(`sn-${tabId}`);
  const plEl   = document.getElementById(`sp-${tabId}`);
  const errEl  = document.getElementById(`se-${tabId}`);
  const raw    = plEl?.value.trim() || '';
  const name   = nameEl?.value.trim() || '';
  const m      = raw.match(/[?&]list=([A-Za-z0-9_-]+)/);
  const plId   = m ? m[1] : raw;

  if (!plId) {
    if (errEl) { errEl.textContent = 'URLまたはIDを入力してください'; errEl.style.display = 'block'; }
    return;
  }
  const tab = tabs.find(t => t.id === tabId);
  if (!tab) return;
  tab.playlistId = plId;
  if (name) tab.name = name;
  delete videoCache[tabId]; // キャッシュクリア
  saveTabs();
  syncPlaylistsToGitHub();
  renderTabBar();
  renderPane(tab);
}

// ── Videos ───────────────────────────────────────────────────────────────────
async function renderVideos(pane, tab) {
  pane.innerHTML = `
    <div class="vid-header">
      <span style="font-size:12px;color:var(--accent)">${esc(tab.name)}</span>
      <span class="vid-count" id="vc-${tab.id}"></span>
      <div style="flex:1"></div>
      <button class="btn-outline btn-sm" onclick="editTabPlaylist('${tab.id}')">設定</button>
      <button class="btn-outline btn-sm" onclick="refreshTab('${tab.id}')">更新</button>
    </div>
    <div id="vg-${tab.id}" class="loading">読み込み中...</div>`;

  if (videoCache[tab.id]) {
    renderGrid(tab.id, videoCache[tab.id]);
    return;
  }
  try {
    const res  = await fetch(`${WORKER}/videos?playlistId=${tab.playlistId}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    videoCache[tab.id] = data;
    renderGrid(tab.id, data);
  } catch(e) {
    const el = document.getElementById(`vg-${tab.id}`);
    if (el) el.innerHTML = `<div class="empty">エラー: ${esc(e.message)}</div>`;
  }
}

function renderGrid(tabId, videos) {
  const vc = document.getElementById(`vc-${tabId}`);
  const vg = document.getElementById(`vg-${tabId}`);
  if (vc) vc.textContent = videos.length + '本';
  if (!vg) return;
  if (!videos.length) { vg.innerHTML = '<div class="empty">動画がありません</div>'; return; }
  vg.className = 'video-grid';
  vg.innerHTML = videos.map(v => `
    <div class="video-card" onclick="playVideo('${v.id}','${escAttr(v.title)}')">
      <img src="${v.thumb}" loading="lazy" onerror="this.style.background='var(--bg3)'">
      <div class="vc-title">${esc(v.title)}</div>
    </div>`).join('');
}

function playVideo(id, title) {
  location.href = `player.html?v=${id}&t=${encodeURIComponent(title)}`;
}

function editTabPlaylist(tabId) {
  const tab  = tabs.find(t => t.id === tabId);
  const pane = document.getElementById('pane-' + tabId);
  if (tab && pane) renderSetup(pane, tab);
}

async function refreshTab(tabId) {
  delete videoCache[tabId];
  const tab  = tabs.find(t => t.id === tabId);
  const pane = document.getElementById('pane-' + tabId);
  if (tab && pane) renderVideos(pane, tab);
}

// ── Tab management ────────────────────────────────────────────────────────────
function switchTab(id) {
  activeTabId = id;
  saveTabs();
  document.querySelectorAll('.tab-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
  document.querySelectorAll('.pane').forEach(el => {
    const active = el.id === 'pane-' + id;
    el.classList.toggle('active', active);
    if (active && !el.children.length) {
      const tab = tabs.find(t => t.id === id);
      if (tab) renderPane(tab);
    }
  });
}

function addTab() {
  const tab = newTab('新しいタブ', '');
  tabs.push(tab);
  activeTabId = tab.id;
  saveTabs();
  const pane = document.createElement('div');
  pane.className = 'pane active';
  pane.id = 'pane-' + tab.id;
  document.getElementById('app').appendChild(pane);
  renderSetup(pane, tab);
  document.querySelectorAll('.pane').forEach(el => el.classList.toggle('active', el.id === 'pane-' + tab.id));
  renderTabBar();
}

function closeTab(id) {
  if (tabs.length === 1) return;
  const idx = tabs.findIndex(t => t.id === id);
  const tab = tabs[idx];

  // Recents に追加
  recents.unshift({ ...tab, deletedAt: Date.now() });
  if (recents.length > 20) recents = recents.slice(0, 20);
  saveRecents();

  tabs.splice(idx, 1);
  document.getElementById('pane-' + id)?.remove();
  if (activeTabId === id) activeTabId = tabs[Math.min(idx, tabs.length - 1)].id;
  saveTabs();
  syncPlaylistsToGitHub();
  renderTabBar();
  document.querySelectorAll('.pane').forEach(el => el.classList.toggle('active', el.id === 'pane-' + activeTabId));
}

// ── Rename ────────────────────────────────────────────────────────────────────
function openRename(id) {
  renameTabId = id;
  const tab = tabs.find(t => t.id === id);
  document.getElementById('rename-input').value = tab?.name || '';
  document.getElementById('rename-modal').classList.add('open');
  setTimeout(() => { document.getElementById('rename-input').focus(); document.getElementById('rename-input').select(); }, 50);
}
function confirmRename() {
  const name = document.getElementById('rename-input').value.trim();
  if (!name || !renameTabId) return closeModal('rename-modal');
  const tab = tabs.find(t => t.id === renameTabId);
  if (tab) { tab.name = name; saveTabs(); renderTabBar(); }
  closeModal('rename-modal');
}
document.getElementById('rename-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmRename();
  if (e.key === 'Escape') closeModal('rename-modal');
});

// ── Recents panel ─────────────────────────────────────────────────────────────
function toggleRecent() {
  recentOpen = !recentOpen;
  document.getElementById('recent-panel').classList.toggle('open', recentOpen);
  if (recentOpen) renderRecentList();
}
function renderRecentList() {
  const el = document.getElementById('rp-list');
  if (!recents.length) { el.innerHTML = '<div class="empty" style="padding:20px">削除したタブはありません</div>'; return; }
  el.innerHTML = recents.map((r, i) => `
    <div class="recent-item">
      <div class="ri-info">
        <div class="ri-name">${esc(r.name)}</div>
        <div class="ri-pl">${esc(r.playlistId || '未設定')}</div>
        <div class="ri-time">${fmtTime(r.deletedAt)}</div>
      </div>
      <button class="btn-accent btn-sm" onclick="restoreTab(${i})">復元</button>
    </div>`).join('');
}
function restoreTab(idx) {
  const r = recents[idx];
  if (!r) return;
  const tab = { id: newTab('', '').id, name: r.name, playlistId: r.playlistId, createdAt: Date.now() };
  tabs.push(tab);
  recents.splice(idx, 1);
  saveRecents();
  saveTabs();
  syncPlaylistsToGitHub();
  const pane = document.createElement('div');
  pane.className = 'pane';
  pane.id = 'pane-' + tab.id;
  document.getElementById('app').appendChild(pane);
  renderTabBar();
  renderRecentList();
}

// ── Share ─────────────────────────────────────────────────────────────────────
function openShare() {
  const box = document.getElementById('share-checks');
  box.innerHTML = tabs.map(t => `
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;cursor:pointer">
      <input type="checkbox" value="${t.id}" checked style="accent-color:var(--accent)">
      <span>${esc(t.name)}</span>
      <span style="font-size:10px;color:var(--muted)">${t.playlistId || '未設定'}</span>
    </label>`).join('');
  document.getElementById('share-url-box').style.display = 'none';
  document.getElementById('share-modal').classList.add('open');
}
function generateShareUrl() {
  const checked = [...document.querySelectorAll('#share-checks input:checked')].map(el => el.value);
  const selected = tabs.filter(t => checked.includes(t.id)).map(t => ({ name: t.name, playlistId: t.playlistId }));
  if (!selected.length) return;
  const encoded = btoa(JSON.stringify(selected));
  const url = `${location.origin}${location.pathname}?import=${encoded}`;
  document.getElementById('share-url-text').textContent = url;
  document.getElementById('share-url-box').style.display = 'block';
}
function copyShareUrl() {
  const text = document.getElementById('share-url-text').textContent;
  navigator.clipboard.writeText(text).then(() => alert('URLをコピーしました'));
}

// ── Import ───────────────────────────────────────────────────────────────────
function showImportModal(data) {
  document.getElementById('import-preview').innerHTML =
    `<b style="color:var(--accent)">${data.length}件</b>のプレイリストをインポートします:<br><br>` +
    data.map(t => `• ${esc(t.name)} <span style="color:var(--muted);font-size:10px">${esc(t.playlistId || '')}</span>`).join('<br>');
  document.getElementById('import-modal').classList.add('open');
}
function confirmImport() {
  if (!pendingImport) return closeModal('import-modal');
  pendingImport.forEach(d => {
    const tab = newTab(d.name || '無題', d.playlistId || '');
    tabs.push(tab);
    const pane = document.createElement('div');
    pane.className = 'pane';
    pane.id = 'pane-' + tab.id;
    document.getElementById('app').appendChild(pane);
  });
  saveTabs();
  syncPlaylistsToGitHub();
  renderTabBar();
  pendingImport = null;
  closeModal('import-modal');
}

// ── Sync to GitHub ────────────────────────────────────────────────────────────
async function syncPlaylistsToGitHub() {
  const playlists = tabs.filter(t => t.playlistId).map(t => ({ id: t.playlistId, title: t.name, autoDownload: false }));
  if (!playlists.length) return;
  try {
    await fetch(`${WORKER}/update-playlists`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ playlists })
    });
  } catch(e) { console.warn('sync:', e); }
}

// ── Push ──────────────────────────────────────────────────────────────────────
async function togglePush() {
  if (!swReg) { alert('Service Workerが利用できません'); return; }
  if (pushSub) { await pushSub.unsubscribe(); pushSub = null; updatePushBadge(); return; }
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') { alert('通知が許可されていません'); return; }
  try {
    await navigator.serviceWorker.ready;
    pushSub = await swReg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlB64ToUint8(VAPID_PUBLIC_KEY) });
    const res = await fetch(WORKER, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ subscription: pushSub.toJSON() }) });
    if (!res.ok) throw new Error(`Worker: ${res.status}`);
    updatePushBadge();
  } catch(e) { alert('登録エラー: ' + e.message); }
}
function updatePushBadge() {
  const on = !!pushSub;
  document.getElementById('push-badge').textContent = on ? 'PUSH ON' : 'PUSH OFF';
  document.getElementById('push-badge').className = on ? 'badge' : 'badge off';
}

// ── Notifications ─────────────────────────────────────────────────────────────
function toggleNotifPanel() {
  notifOpen = !notifOpen;
  document.getElementById('notif-panel').classList.toggle('open', notifOpen);
  if (notifOpen) renderNotifList();
}
function renderNotifList() {
  const el = document.getElementById('np-list');
  if (!notifs.length) { el.innerHTML = '<div class="empty" style="padding:20px">通知はありません</div>'; return; }
  el.innerHTML = notifs.map(n => `
    <div class="notif-item">
      <div class="ni-title">${esc(n.title)}</div>
      <div class="ni-body">${esc(n.body)}</div>
      ${n.url ? `<a class="ni-link" href="${n.url}" target="_blank">▶ 開く</a>` : ''}
      <div class="ni-time">${fmtTime(n.time)}</div>
    </div>`).join('');
}
function clearNotifs() { notifs = []; localStorage.setItem('yt_notifs', '[]'); updateNotifBadge(); renderNotifList(); }
function updateNotifBadge() {
  document.getElementById('notif-badge').textContent = notifs.length + '件';
  document.getElementById('notif-badge').className = notifs.length ? 'badge warn' : 'badge off';
}
navigator.serviceWorker?.addEventListener('message', e => {
  if (e.data?.type === 'push') {
    notifs.unshift({ ...e.data, time: new Date().toISOString() });
    if (notifs.length > 50) notifs = notifs.slice(0, 50);
    localStorage.setItem('yt_notifs', JSON.stringify(notifs));
    updateNotifBadge();
    if (notifOpen) renderNotifList();
  }
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const escAttr = s => String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');
const fmtTime = ts => { const d = new Date(ts); return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
function urlB64ToUint8(b) { const pad='='.repeat((4-b.length%4)%4); const raw=atob((b+pad).replace(/-/g,'+').replace(/_/g,'/')); return Uint8Array.from([...raw].map(c=>c.charCodeAt(0))); }
</script>
