<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#7fffb2">
<link rel="manifest" href="manifest.json">
<title>YT Watcher</title>
<style>
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--border:#2a2a38;--accent:#7fffb2;--accent2:#ff7f50;--accent3:#7fb8ff;--text:#e0e0e8;--muted:#666678;--danger:#ff4466;--r:6px;--tab-h:34px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;font-size:13px;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── Menu bar ── */
#bar{position:fixed;top:0;left:0;right:0;height:28px;background:rgba(10,10,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;z-index:200}
.dots{display:flex;gap:6px;padding:0 12px}
.dot{width:11px;height:11px;border-radius:50%}
.dot.r{background:#ff5f57}.dot.y{background:#ffbd2e}.dot.g{background:#28c840}
.bar-title{padding:0 10px;font-weight:bold;color:var(--accent);font-size:12px}
.spacer{flex:1}
.bar-right{display:flex;align-items:center;gap:6px;padding:0 10px}
.badge{font-size:10px;padding:1px 6px;border-radius:8px;background:var(--accent);color:#000;font-weight:bold;cursor:pointer}
.badge.off{background:var(--muted)}.badge.warn{background:var(--accent2)}

/* ── Chrome-style Tab bar ── */
#tabbar{position:fixed;top:28px;left:0;right:0;height:var(--tab-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:flex-end;padding:0 4px;overflow-x:auto;overflow-y:hidden;z-index:190;gap:1px}
#tabbar::-webkit-scrollbar{height:3px}
.tab-item{flex-shrink:0;height:28px;min-width:120px;max-width:200px;display:flex;align-items:center;gap:6px;padding:0 10px;background:var(--bg3);border:1px solid var(--border);border-bottom:none;border-radius:6px 6px 0 0;cursor:pointer;position:relative;transition:background .15s;user-select:none}
.tab-item.active{background:var(--bg);border-color:var(--border);border-bottom-color:var(--bg)}
.tab-item.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:var(--bg)}
.tab-icon{font-size:12px;flex-shrink:0}
.tab-name{flex:1;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.tab-item:not(.active) .tab-name{color:var(--muted)}
.tab-close{width:16px;height:16px;border-radius:50%;border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;line-height:1;padding:0}
.tab-close:hover{background:var(--border);color:var(--text)}
.tab-add{flex-shrink:0;width:28px;height:28px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:18px;border-radius:6px 6px 0 0;display:flex;align-items:center;justify-content:center;margin-left:2px}
.tab-add:hover{background:var(--bg3);color:var(--accent)}

/* ── Content ── */
#app{position:fixed;top:62px;left:0;right:0;bottom:0;overflow:hidden}
.pane{position:absolute;inset:0;overflow-y:auto;display:none;padding:16px}
.pane.active{display:block}

/* ── Playlist setup ── */
.setup-box{max-width:480px;margin:40px auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:24px}
.setup-box h2{font-size:13px;color:var(--accent);margin-bottom:16px}
.input-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
input[type=text]{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:7px 10px;font-family:inherit;font-size:12px;outline:none;flex:1;min-width:160px}
input[type=text]:focus{border-color:var(--accent)}
button{padding:7px 14px;border-radius:var(--r);border:none;cursor:pointer;font-family:inherit;font-size:12px;transition:all .15s}
.btn-accent{background:var(--accent);color:#000;font-weight:bold}
.btn-accent:hover{filter:brightness(1.1)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:4px 10px;font-size:10px}
.btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}

/* ── Video grid ── */
.vid-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.vid-meta{font-size:10px;color:var(--muted)}
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.video-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .15s}
.video-card:hover{border-color:var(--accent)}
.video-card img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--bg3)}
.vc-title{padding:8px;font-size:11px;line-height:1.4;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.empty{text-align:center;padding:60px 20px;color:var(--muted);line-height:2;font-size:12px}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:12px}

/* ── Notif panel ── */
#notif-panel{position:fixed;top:28px;right:0;width:300px;bottom:0;background:var(--bg2);border-left:1px solid var(--border);z-index:180;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column}
#notif-panel.open{transform:translateX(0)}
.np-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.np-list{flex:1;overflow-y:auto;padding:8px}
.notif-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px;margin-bottom:6px}
.ni-title{font-weight:bold;color:var(--accent);font-size:11px;margin-bottom:2px}
.ni-body{font-size:11px;color:var(--text);line-height:1.5}
.ni-time{font-size:10px;color:var(--muted);margin-top:4px}
.ni-link{display:inline-block;font-size:10px;color:var(--accent3);text-decoration:none;margin-top:4px}

/* ── Push status ── */
.status-msg{font-size:11px;margin-top:8px;padding:6px 10px;border-radius:var(--r)}
.status-msg.ok{background:rgba(127,255,178,.1);border:1px solid var(--accent);color:var(--accent)}
.status-msg.err{background:rgba(255,68,102,.1);border:1px solid var(--danger);color:var(--danger)}
.status-msg.info{background:rgba(127,184,255,.1);border:1px solid var(--accent3);color:var(--accent3)}

/* ── Tab rename modal ── */
#rename-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:center;justify-content:center}
#rename-modal.open{display:flex}
.rename-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;width:320px}
.rename-box h3{font-size:12px;color:var(--accent);margin-bottom:12px}
.rename-box input{width:100%;margin-bottom:10px}

/* ── Section title ── */
.sec{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
</style>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Menu bar -->
<div id="bar">
  <div class="dots"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div>
  <span class="bar-title">YT Watcher</span>
  <div class="spacer"></div>
  <div class="bar-right">
    <span class="badge off" id="push-badge" onclick="togglePush()">PUSH OFF</span>
    <span class="badge off" id="notif-badge" onclick="toggleNotifPanel()">0件</span>
  </div>
</div>

<!-- Tab bar -->
<div id="tabbar">
  <!-- tabs rendered by JS -->
  <button class="tab-add" onclick="addTab()" title="新しいタブ">+</button>
</div>

<!-- Content panes (rendered by JS) -->
<div id="app"></div>

<!-- Notification panel -->
<div id="notif-panel">
  <div class="np-header">
    <span>通知センター</span>
    <button class="btn-outline btn-sm" onclick="clearNotifs()">全消去</button>
  </div>
  <div class="np-list" id="np-list"></div>
</div>

<!-- Rename modal -->
<div id="rename-modal">
  <div class="rename-box">
    <h3>タブ名を変更</h3>
    <input type="text" id="rename-input" placeholder="タブ名">
    <div style="display:flex;gap:8px">
      <button class="btn-accent" onclick="confirmRename()">保存</button>
      <button class="btn-outline" onclick="closeRename()">キャンセル</button>
    </div>
  </div>
</div>

<script>
const WORKER = 'https://yt-push-register.a6068376.workers.dev';
const VAPID_PUBLIC_KEY = 'BFn5vOBnMFz0R3ZlLHsnKb36VU_Lq5q9iQVFmxjH3q1HK3L9VesUlGW8Jw37LoLmWs-yFXAdMHBmeq22wRT2dmc';

// ── State ────────────────────────────────────────────────────────────────────
let tabs = JSON.parse(localStorage.getItem('yt_tabs') || '[]');
let activeTabId = localStorage.getItem('yt_active_tab') || null;
let notifs = JSON.parse(localStorage.getItem('yt_notifs') || '[]');
let swReg = null, pushSub = null, notifOpen = false;
let renameTabId = null;
let videoCache = {}; // tabId → videos[]

if (!tabs.length) {
  tabs = [newTab('プレイリスト 1', '')];
  saveTabs();
}
if (!activeTabId || !tabs.find(t => t.id === activeTabId)) {
  activeTabId = tabs[0].id;
}

function newTab(name, playlistId) {
  return { id: Date.now().toString(36) + Math.random().toString(36).slice(2), name, playlistId };
}

function saveTabs() {
  localStorage.setItem('yt_tabs', JSON.stringify(tabs));
  localStorage.setItem('yt_active_tab', activeTabId);
}

// ── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  if ('serviceWorker' in navigator) {
    try {
      swReg = await navigator.serviceWorker.register('sw.js');
      await navigator.serviceWorker.ready;
      pushSub = await swReg.pushManager.getSubscription();
      updatePushBadge();
    } catch(e) { console.error('SW:', e); }
  }
  renderTabBar();
  renderApp();
  updateNotifBadge();
})();

// ── Tab bar ───────────────────────────────────────────────────────────────────
function renderTabBar() {
  const bar = document.getElementById('tabbar');
  const addBtn = bar.querySelector('.tab-add');
  // Remove old tab items
  bar.querySelectorAll('.tab-item').forEach(el => el.remove());

  tabs.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab-item' + (tab.id === activeTabId ? ' active' : '');
    el.dataset.id = tab.id;
    el.innerHTML = `
      <span class="tab-icon">${tab.playlistId ? '▶' : '○'}</span>
      <span class="tab-name">${escHtml(tab.name)}</span>
      <button class="tab-close" onclick="closeTab(event,'${tab.id}')">×</button>`;
    el.addEventListener('click', () => switchTab(tab.id));
    el.addEventListener('dblclick', () => openRename(tab.id));
    bar.insertBefore(el, addBtn);
  });

  // Scroll active tab into view
  const activeEl = bar.querySelector('.tab-item.active');
  if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', inline: 'center' });
}

function renderApp() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  tabs.forEach(tab => {
    const pane = document.createElement('div');
    pane.className = 'pane' + (tab.id === activeTabId ? ' active' : '');
    pane.id = 'pane-' + tab.id;
    app.appendChild(pane);
    if (tab.id === activeTabId) renderPane(tab);
  });
}

function renderPane(tab) {
  const pane = document.getElementById('pane-' + tab.id);
  if (!pane) return;
  if (!tab.playlistId) {
    renderSetup(pane, tab);
  } else {
    renderVideos(pane, tab);
  }
}

// ── Setup screen ──────────────────────────────────────────────────────────────
function renderSetup(pane, tab) {
  pane.innerHTML = `
    <div class="setup-box">
      <h2>プレイリストを設定</h2>
      <div class="sec">プレイリストURL または ID</div>
      <div class="input-row">
        <input type="text" id="pl-url-${tab.id}" placeholder="https://www.youtube.com/playlist?list=PL...">
      </div>
      <div class="input-row">
        <input type="text" id="pl-name-${tab.id}" value="${escHtml(tab.name)}" placeholder="タブ名">
        <button class="btn-accent" onclick="saveTabPlaylist('${tab.id}')">保存</button>
      </div>
      <div id="pl-err-${tab.id}" class="status-msg err" style="display:none"></div>
    </div>`;
}

function saveTabPlaylist(tabId) {
  const raw = document.getElementById(`pl-url-${tabId}`)?.value.trim() || '';
  const name = document.getElementById(`pl-name-${tabId}`)?.value.trim() || '';
  const m = raw.match(/[?&]list=([A-Za-z0-9_-]+)/);
  const plId = m ? m[1] : raw;
  if (!plId) {
    document.getElementById(`pl-err-${tabId}`).textContent = 'URLまたはIDを入力してください';
    document.getElementById(`pl-err-${tabId}`).style.display = 'block';
    return;
  }
  const tab = tabs.find(t => t.id === tabId);
  if (tab) {
    tab.playlistId = plId;
    if (name) tab.name = name;
    saveTabs();
    syncPlaylistsToGitHub();
    renderTabBar();
    renderPane(tab);
  }
}

// ── Videos ───────────────────────────────────────────────────────────────────
async function renderVideos(pane, tab) {
  if (videoCache[tab.id]) {
    renderVideoGrid(pane, tab, videoCache[tab.id]);
    return;
  }
  pane.innerHTML = `
    <div class="vid-header">
      <span style="font-size:12px;color:var(--accent)">${escHtml(tab.name)}</span>
      <span class="vid-meta" id="vid-meta-${tab.id}"></span>
      <div class="spacer"></div>
      <button class="btn-outline btn-sm" onclick="editTabPlaylist('${tab.id}')">設定</button>
      <button class="btn-outline btn-sm" onclick="refreshTab('${tab.id}')">更新</button>
    </div>
    <div id="vid-grid-${tab.id}" class="loading">読み込み中...</div>`;

  try {
    const res = await fetch(`${WORKER}/videos?playlistId=${tab.playlistId}`);
    const videos = await res.json();
    if (videos.error) throw new Error(videos.error);
    videoCache[tab.id] = videos;
    renderVideoGrid(pane, tab, videos);
  } catch(e) {
    const el = document.getElementById(`vid-grid-${tab.id}`);
    if (el) el.innerHTML = `<div class="empty">エラー: ${e.message}</div>`;
  }
}

function renderVideoGrid(pane, tab, videos) {
  const meta = document.getElementById(`vid-meta-${tab.id}`);
  if (meta) meta.textContent = videos.length + '本';

  const grid = document.getElementById(`vid-grid-${tab.id}`);
  if (!grid) return;
  if (!videos.length) { grid.innerHTML = '<div class="empty">動画がありません</div>'; return; }

  grid.className = 'video-grid';
  grid.innerHTML = videos.map(v => `
    <div class="video-card" onclick="playVideo('${v.id}','${escAttr(v.title)}')">
      <img src="${v.thumb}" loading="lazy" onerror="this.style.background='var(--bg3)'">
      <div class="vc-title">${escHtml(v.title)}</div>
    </div>`).join('');
}

function playVideo(id, title) {
  location.href = `player.html?v=${id}&t=${encodeURIComponent(title)}`;
}

async function refreshTab(tabId) {
  delete videoCache[tabId];
  const tab = tabs.find(t => t.id === tabId);
  const pane = document.getElementById('pane-' + tabId);
  if (tab && pane) renderVideos(pane, tab);
}

function editTabPlaylist(tabId) {
  const tab = tabs.find(t => t.id === tabId);
  const pane = document.getElementById('pane-' + tabId);
  if (tab && pane) renderSetup(pane, tab);
}

// ── Tab management ────────────────────────────────────────────────────────────
function switchTab(id) {
  activeTabId = id;
  saveTabs();
  document.querySelectorAll('.tab-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
  document.querySelectorAll('.pane').forEach(el => {
    const isActive = el.id === 'pane-' + id;
    el.classList.toggle('active', isActive);
    if (isActive) {
      const tab = tabs.find(t => t.id === id);
      if (tab && !el.querySelector('.video-grid, .setup-box, .loading')) renderPane(tab);
    }
  });
}

function addTab() {
  const tab = newTab('新しいタブ', '');
  tabs.push(tab);
  activeTabId = tab.id;
  saveTabs();
  // Add pane
  const pane = document.createElement('div');
  pane.className = 'pane active';
  pane.id = 'pane-' + tab.id;
  document.getElementById('app').appendChild(pane);
  renderSetup(pane, tab);
  renderTabBar();
  document.querySelectorAll('.pane').forEach(el => el.classList.toggle('active', el.id === 'pane-' + tab.id));
}

function closeTab(e, id) {
  e.stopPropagation();
  if (tabs.length === 1) return; // 最後のタブは消せない
  const idx = tabs.findIndex(t => t.id === id);
  tabs.splice(idx, 1);
  document.getElementById('pane-' + id)?.remove();
  if (activeTabId === id) {
    activeTabId = tabs[Math.min(idx, tabs.length - 1)].id;
  }
  saveTabs();
  syncPlaylistsToGitHub();
  renderTabBar();
  document.querySelectorAll('.pane').forEach(el => el.classList.toggle('active', el.id === 'pane-' + activeTabId));
}

// ── Rename ───────────────────────────────────────────────────────────────────
function openRename(id) {
  renameTabId = id;
  const tab = tabs.find(t => t.id === id);
  document.getElementById('rename-input').value = tab?.name || '';
  document.getElementById('rename-modal').classList.add('open');
  document.getElementById('rename-input').focus();
  document.getElementById('rename-input').select();
}

function confirmRename() {
  const name = document.getElementById('rename-input').value.trim();
  if (!name || !renameTabId) return closeRename();
  const tab = tabs.find(t => t.id === renameTabId);
  if (tab) { tab.name = name; saveTabs(); renderTabBar(); }
  closeRename();
}

function closeRename() {
  document.getElementById('rename-modal').classList.remove('open');
  renameTabId = null;
}

document.getElementById('rename-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmRename();
  if (e.key === 'Escape') closeRename();
});

// ── Sync playlists to GitHub ──────────────────────────────────────────────────
async function syncPlaylistsToGitHub() {
  const playlists = tabs
    .filter(t => t.playlistId)
    .map(t => ({ id: t.playlistId, title: t.name, autoDownload: false }));
  if (!playlists.length) return;
  try {
    await fetch(`${WORKER}/update-playlists`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ playlists })
    });
  } catch(e) { console.warn('sync playlists:', e); }
}

// ── Push ─────────────────────────────────────────────────────────────────────
async function togglePush() {
  if (!swReg) { alert('Service Workerが利用できません'); return; }
  if (pushSub) {
    await pushSub.unsubscribe(); pushSub = null; updatePushBadge(); return;
  }
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') { alert('通知が許可されていません'); return; }
  try {
    await navigator.serviceWorker.ready;
    pushSub = await swReg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlB64ToUint8(VAPID_PUBLIC_KEY)
    });
    const res = await fetch(WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subscription: pushSub.toJSON() })
    });
    if (!res.ok) throw new Error(`Worker: ${res.status}`);
    updatePushBadge();
  } catch(e) { alert('登録エラー: ' + e.message); }
}

function updatePushBadge() {
  const on = !!pushSub;
  document.getElementById('push-badge').textContent = on ? 'PUSH ON' : 'PUSH OFF';
  document.getElementById('push-badge').className = on ? 'badge' : 'badge off';
}

// ── Notifications ─────────────────────────────────────────────────────────────
function toggleNotifPanel() {
  notifOpen = !notifOpen;
  document.getElementById('notif-panel').classList.toggle('open', notifOpen);
  if (notifOpen) renderNotifList();
}

function renderNotifList() {
  const el = document.getElementById('np-list');
  if (!notifs.length) { el.innerHTML = '<div class="empty" style="padding:30px">通知はありません</div>'; return; }
  el.innerHTML = notifs.map(n => `
    <div class="notif-item">
      <div class="ni-title">${escHtml(n.title)}</div>
      <div class="ni-body">${escHtml(n.body)}</div>
      ${n.url ? `<a class="ni-link" href="${n.url}" target="_blank">▶ 開く</a>` : ''}
      <div class="ni-time">${fmtTime(n.time)}</div>
    </div>`).join('');
}

function clearNotifs() {
  notifs = []; localStorage.setItem('yt_notifs', '[]');
  updateNotifBadge(); renderNotifList();
}

function updateNotifBadge() {
  document.getElementById('notif-badge').textContent = notifs.length + '件';
  document.getElementById('notif-badge').className = notifs.length ? 'badge warn' : 'badge off';
}

navigator.serviceWorker?.addEventListener('message', e => {
  if (e.data?.type === 'push') {
    notifs.unshift({ ...e.data, time: new Date().toISOString() });
    if (notifs.length > 50) notifs = notifs.slice(0, 50);
    localStorage.setItem('yt_notifs', JSON.stringify(notifs));
    updateNotifBadge();
    if (notifOpen) renderNotifList();
  }
});

// ── Helpers ───────────────────────────────────────────────────────────────────
const fmtTime = iso => { const d = new Date(iso); return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
const escHtml = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const escAttr = s => String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');
