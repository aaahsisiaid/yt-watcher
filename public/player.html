<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#000">
<title>Player</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{height:100%;background:#000;color:#fff;font-family:'Space Mono',monospace;overflow:hidden;touch-action:manipulation}
#yt-player{position:absolute;inset:0;pointer-events:none}
#yt-player iframe{width:100%;height:100%;border:none}
/* Controls */
#ctrl{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;transition:opacity .25s}
#ctrl.hidden{opacity:0;pointer-events:none}
#top{display:flex;align-items:center;gap:10px;padding:12px 14px 20px;background:linear-gradient(rgba(0,0,0,.75),transparent)}
#back-btn{background:none;border:none;color:#fff;cursor:pointer;padding:4px 8px;font-size:20px;line-height:1}
#ttl{flex:1;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#ddd}
#bot{padding:6px 14px 20px;background:linear-gradient(transparent,rgba(0,0,0,.8))}
/* Seek bar */
#seek-wrap{position:relative;height:22px;display:flex;align-items:center;margin-bottom:4px;cursor:pointer;touch-action:none}
#seek-bg{position:absolute;height:3px;width:100%;background:rgba(255,255,255,.2);border-radius:2px}
#seek-buf{position:absolute;height:3px;background:rgba(255,255,255,.35);border-radius:2px;width:0}
#seek-fill{position:absolute;height:3px;background:#7fffb2;border-radius:2px;width:0}
#seek-thumb{position:absolute;width:14px;height:14px;background:#7fffb2;border-radius:50%;transform:translateX(-50%);left:0;top:50%;margin-top:-7px;transition:transform .1s}
#seek-wrap:active #seek-thumb{transform:translateX(-50%) scale(1.4)}
/* Row */
#bot-row{display:flex;align-items:center;gap:8px}
.ibtn{background:none;border:none;color:#fff;cursor:pointer;padding:6px;font-size:18px;line-height:1;border-radius:50%}
.ibtn:active{background:rgba(255,255,255,.15)}
.ibtn svg{width:20px;height:20px;fill:#fff;display:block}
#time-disp{font-size:11px;color:#bbb;white-space:nowrap}
.sp{flex:1}
/* Quality menu */
#q-menu{position:absolute;bottom:68px;right:14px;background:#111;border:1px solid #2a2a2a;border-radius:8px;overflow:hidden;display:none;z-index:20;min-width:80px}
#q-menu.open{display:block}
#q-menu button{display:block;width:100%;padding:9px 16px;background:none;border:none;color:#ccc;font-size:12px;font-family:inherit;cursor:pointer;text-align:left}
#q-menu button:active,#q-menu button.sel{background:#1e1e1e;color:#7fffb2}
/* Center overlays */
#center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:10px}
#play-flash{width:56px;height:56px;background:rgba(0,0,0,.6);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
#play-flash.show{opacity:1}
#speed-badge{background:rgba(0,0,0,.75);color:#7fffb2;padding:5px 16px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s}
#speed-badge.show{opacity:1}
#spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.15);border-top-color:#7fffb2;border-radius:50%;animation:spin 1s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
#err-msg{background:rgba(180,40,40,.85);padding:8px 16px;border-radius:8px;font-size:12px;display:none;text-align:center}
/* Tap zone */
#tap{position:absolute;top:56px;left:0;right:0;bottom:72px}
</style>
</head>
<body>
<div id="yt-player"><div id="player"></div></div>

<div id="center">
  <div id="spinner"></div>
  <div id="play-flash">
    <svg id="flash-svg" viewBox="0 0 24 24" width="28" height="28" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
  </div>
  <div id="speed-badge"></div>
  <div id="err-msg"></div>
</div>

<div id="tap"></div>

<div id="ctrl">
  <div id="top">
    <button id="back-btn" onclick="history.back()">&#8592;</button>
    <div id="ttl"></div>
  </div>
  <div id="bot">
    <div id="seek-wrap">
      <div id="seek-bg"></div>
      <div id="seek-buf"></div>
      <div id="seek-fill"></div>
      <div id="seek-thumb"></div>
    </div>
    <div id="bot-row">
      <button class="ibtn" id="play-btn">
        <svg id="play-svg" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <span id="time-disp">0:00 / 0:00</span>
      <div class="sp"></div>
      <button class="ibtn" id="q-btn">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      </button>
      <button class="ibtn" id="fs-btn">
        <svg id="fs-svg" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </button>
    </div>
  </div>
</div>

<div id="q-menu"></div>

<script>
const params = new URLSearchParams(location.search);
const videoId = params.get('v') || '';
const title   = decodeURIComponent(params.get('t') || '');
document.getElementById('ttl').textContent = title;

let player, dur = 0, isSeeking = false, longTimer = null, isLong = false;
let ctrlTimer = null;

// Load YouTube IFrame API
const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);

window.onYouTubeIframeAPIReady = () => {
  player = new YT.Player('player', {
    videoId,
    playerVars: { autoplay: 1, controls: 0, rel: 0, playsinline: 1, modestbranding: 1, iv_load_policy: 3 },
    events: {
      onReady: e => { e.target.playVideo(); showCtrl(); },
      onStateChange: e => {
        const s = document.getElementById('spinner');
        s.style.display = e.data === YT.PlayerState.BUFFERING ? 'block' : 'none';
        if (e.data === YT.PlayerState.PLAYING) {
          updatePlayBtn(true); startTick();
        } else if (e.data === YT.PlayerState.PAUSED || e.data === YT.PlayerState.ENDED) {
          updatePlayBtn(false);
        }
      },
      onError: e => {
        const err = document.getElementById('err-msg');
        err.textContent = '再生エラー (code:' + e.data + ')';
        err.style.display = 'block';
        document.getElementById('spinner').style.display = 'none';
      }
    }
  });
};

// Tick
let tickId;
function startTick() {
  clearInterval(tickId);
  tickId = setInterval(() => {
    if (!player || !player.getCurrentTime) return;
    const cur = player.getCurrentTime();
    dur = player.getDuration() || 0;
    if (!isSeeking) updateSeekUI(cur, dur);
    document.getElementById('time-disp').textContent = fmt(cur) + ' / ' + fmt(dur);
    try {
      const buf = (player.getVideoLoadedFraction() || 0) * 100;
      document.getElementById('seek-buf').style.width = buf + '%';
    } catch {}
  }, 400);
}

function updateSeekUI(cur, d) {
  if (!d) return;
  const pct = (cur / d) * 100;
  document.getElementById('seek-fill').style.width = pct + '%';
  document.getElementById('seek-thumb').style.left = pct + '%';
}

function fmt(s) {
  s = Math.floor(s || 0);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

function updatePlayBtn(playing) {
  document.getElementById('play-svg').innerHTML = playing
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

// Play/pause button
document.getElementById('play-btn').addEventListener('click', () => {
  if (!player) return;
  showCtrl();
  player.getPlayerState() === YT.PlayerState.PLAYING ? player.pauseVideo() : player.playVideo();
});

// Tap zone
const tap = document.getElementById('tap');
tap.addEventListener('click', e => {
  if (isLong) return;
  if (!player) return;
  showCtrl();
  const state = player.getPlayerState();
  state === YT.PlayerState.PLAYING ? player.pauseVideo() : player.playVideo();
  const svg = document.getElementById('flash-svg');
  svg.innerHTML = state === YT.PlayerState.PLAYING
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
  const fi = document.getElementById('play-flash');
  fi.classList.add('show'); setTimeout(() => fi.classList.remove('show'), 500);
});

// Long press = 2x speed
tap.addEventListener('touchstart', e => {
  isLong = false;
  longTimer = setTimeout(() => {
    isLong = true;
    if (player) player.setPlaybackRate(2);
    const b = document.getElementById('speed-badge');
    b.textContent = '2x'; b.classList.add('show');
  }, 500);
}, { passive: true });
tap.addEventListener('touchend', () => {
  clearTimeout(longTimer);
  if (isLong) {
    if (player) player.setPlaybackRate(1);
    const b = document.getElementById('speed-badge');
    b.textContent = '1x';
    setTimeout(() => b.classList.remove('show'), 700);
  }
  isLong = false;
});
tap.addEventListener('touchmove', () => clearTimeout(longTimer), { passive: true });

// Seek bar
const sw = document.getElementById('seek-wrap');
function seekAt(clientX) {
  const r = sw.getBoundingClientRect();
  const pct = Math.max(0, Math.min((clientX - r.left) / r.width, 1));
  document.getElementById('seek-fill').style.width = (pct * 100) + '%';
  document.getElementById('seek-thumb').style.left = (pct * 100) + '%';
  if (player && player.seekTo) player.seekTo(pct * (dur || 0), true);
}
sw.addEventListener('touchstart', e => { isSeeking = true; seekAt(e.touches[0].clientX); e.stopPropagation(); }, { passive: true });
sw.addEventListener('touchmove', e => { if (isSeeking) seekAt(e.touches[0].clientX); e.stopPropagation(); }, { passive: true });
sw.addEventListener('touchend', e => { isSeeking = false; e.stopPropagation(); }, { passive: true });
sw.addEventListener('mousedown', e => { isSeeking = true; seekAt(e.clientX); });
window.addEventListener('mousemove', e => { if (isSeeking) seekAt(e.clientX); });
window.addEventListener('mouseup', () => { isSeeking = false; });

// Quality menu
const QUALITIES = [
  { label: '1080p', val: 'hd1080' }, { label: '720p', val: 'hd720' },
  { label: '480p', val: 'large' },   { label: '360p', val: 'medium' },
  { label: '240p', val: 'small' },   { label: '自動', val: 'default' }
];
const qMenu = document.getElementById('q-menu');
qMenu.innerHTML = QUALITIES.map(q =>
  `<button onclick="setQ('${q.val}')">${q.label}</button>`
).join('');
function setQ(val) {
  if (player) player.setPlaybackQuality(val);
  qMenu.querySelectorAll('button').forEach((b, i) => b.classList.toggle('sel', QUALITIES[i].val === val));
  qMenu.classList.remove('open');
  showCtrl();
}
document.getElementById('q-btn').addEventListener('click', e => {
  e.stopPropagation(); qMenu.classList.toggle('open'); showCtrl();
});

// Fullscreen + auto landscape
document.getElementById('fs-btn').addEventListener('click', async () => {
  if (!document.fullscreenElement) {
    await document.documentElement.requestFullscreen({ navigationUI: 'hide' }).catch(() => {});
    await screen.orientation?.lock('landscape').catch(() => {});
  } else {
    await document.exitFullscreen().catch(() => {});
    await screen.orientation?.unlock();
  }
});
document.addEventListener('fullscreenchange', () => {
  document.getElementById('fs-svg').innerHTML = document.fullscreenElement
    ? '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>'
    : '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
});

// Controls visibility
function showCtrl() {
  const c = document.getElementById('ctrl');
  c.classList.remove('hidden');
  clearTimeout(ctrlTimer);
  ctrlTimer = setTimeout(() => c.classList.add('hidden'), 3000);
}
document.getElementById('ctrl').addEventListener('click', showCtrl);
document.addEventListener('contextmenu', e => e.preventDefault());
showCtrl();
</script>
</body>
</html>
